{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Sent - ASSIST</title>
    <link rel="stylesheet" href="{% static 'hello/css/style.css' %}">
</head>
<body>
    <div class="login-container">
        <div class="login-form-section">
            <h1>Check Your Email</h1>
            <p>If an account exists with the email you provided, you will receive an email with instructions to reset your password.</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="{% if message.tags %}{{ message.tags }}-message{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <div class="back-link">
                <a href="{% url 'admin_login' %}">← Back to Login</a>
            </div>
        </div>

        <div class="decorative-section">
            <img src="{% static 'hello/img/hello.png' %}" alt="Decorative Pattern" class="decorative-image">
        </div>
    </div>
</body>
</html>
