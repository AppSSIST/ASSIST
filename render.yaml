services:
  - type: web
    name: auto-scheduling
    env: python
    pythonVersion: 3.11
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput && python -c "import os, django; os.environ.setdefault('DJANGO_SETTINGS_MODULE','ASSIST.settings'); django.setup(); from django.contrib.auth import get_user_model; User=get_user_model(); u=os.getenv('DJANGO_SUPERUSER_USERNAME'); p=os.getenv('DJANGO_SUPERUSER_PASSWORD'); e=os.getenv('DJANGO_SUPERUSER_EMAIL','');
if u and p:
    obj = User.objects.filter(username=u).first()
    if obj:
        obj.set_password(p); obj.email = e; obj.is_staff = True; obj.is_superuser = True; obj.save()
    else:
        User.objects.create_superuser(u, e, p)"
    startCommand: gunicorn ASSIST.wsgi:application
    envVars:
      - key: SECRET_KEY
        fromDatabase:
          name: auto_scheduling_db
          property: secret_key
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "auto-scheduling-7.onrender.com,localhost,127.0.0.1"

databases:
  - name: auto_scheduling_db
    databaseName: auto_scheduling
    user: postgres_user
