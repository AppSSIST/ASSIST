services:
  - type: web
    name: auto-scheduling
    env: python
    pythonVersion: 3.11
    region: oregon
    plan: free
    buildCommand: |
      set -e
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py collectstatic --noinput
      python render_create_superuser.py
    startCommand: gunicorn ASSIST.wsgi:application
    envVars:
      - key: SECRET_KEY
        fromDatabase:
          name: auto_scheduling_db
          property: secret_key
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "auto-scheduling-7.onrender.com,localhost,127.0.0.1"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp-relay.brevo.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: "apikey"
      - key: EMAIL_HOST_PASSWORD
        value: "xsmtpsib-5f40c0982f19cbb695e8b362f00508ce3a6bb594576344461ed9c65732c1a44b-TjWp3WM3tuMhjT3q"
      - key: BREVO_API_KEY
        value: "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"
      - key: EMAIL_TIMEOUT
